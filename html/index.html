<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Ultimate Formatter</title>
    <style>
        :root {
            --primary: #0a66c2;
            --primary-hover: #004182;
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text-main: #191919;
            --text-sub: #666666;
            --border: #e0e0e0;
            --accent: #eef3f8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .app-container {
            background: var(--surface);
            width: 100%;
            max-width: 750px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border);
            background: #fff;
        }

        .header h1 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header p {
            margin: 6px 0 0;
            font-size: 0.9rem;
            color: var(--text-sub);
        }

        /* TOOLBARS */
        .toolbar-group {
            padding: 12px 24px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #999;
            font-weight: 600;
            margin-right: 8px;
        }

        button {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
            color: #444;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background: var(--accent);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        /* Special button styles */
        .btn-magic {
            background: linear-gradient(135deg, #fff 0%, #f0f7ff 100%);
            border-color: #cce4ff;
            color: var(--primary);
            font-weight: 600;
        }

        /* Styles for button previews */
        .preview-bold { font-weight: bold; }
        .preview-italic { font-style: italic; }
        .preview-under { text-decoration: underline; }
        .preview-script { font-family: "Brush Script MT", cursive; }

        /* EDITOR */
        .editor-wrapper {
            position: relative;
            background: #fafafa;
        }

        textarea {
            width: 100%;
            height: 320px;
            border: none;
            padding: 32px;
            font-size: 1.05rem;
            line-height: 1.6;
            outline: none;
            background: transparent;
            font-family: inherit;
            color: #333;
            box-sizing: border-box;
            resize: none;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* FOOTER */
        .footer {
            padding: 16px 32px;
            background: #fff;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .stats {
            font-size: 0.85rem;
            color: var(--text-sub);
            display: flex;
            gap: 15px;
            flex-shrink: 0;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 4px 12px rgba(10, 102, 194, 0.2);
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            color: white;
            box-shadow: 0 6px 16px rgba(10, 102, 194, 0.3);
        }

        /* TOAST NOTIFICATION */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translate(-50%, 20px);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 2000;
        }
        .toast.visible {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        /* EMOJI PICKER MODAL */
        .emoji-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .emoji-modal.visible {
            display: flex;
        }
        .emoji-modal-content {
            background: white;
            border-radius: 12px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        /* FIX: replaced float:right with flexbox for modal header */
        .emoji-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0 0 16px 0;
        }
        .emoji-modal-header h2 {
            margin: 0;
            color: var(--primary);
            font-size: 1.2rem;
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        .emoji-btn {
            background: #f0f0f0;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            font-size: 1.8rem;
            transition: all 0.2s;
        }
        .emoji-btn:hover {
            background: var(--accent);
            border-color: var(--primary);
            transform: scale(1.1);
        }
        .emoji-close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
            padding: 0;
            line-height: 1;
            flex-shrink: 0;
        }
        .emoji-close-btn:hover {
            color: #000;
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 600px) {
            body {
                padding: 0;
                align-items: stretch;
            }
            .app-container {
                border-radius: 0;
                min-height: 100vh;
                max-width: 100%;
                border: none;
            }
            .toolbar-group {
                padding: 10px;
                gap: 5px;
                justify-content: center;
            }
            textarea {
                padding: 16px;
                font-size: 1rem;
                height: 280px;
            }
            .header {
                padding: 16px;
            }
            .header h1 {
                font-size: 1.1rem;
            }
            .header p {
                font-size: 0.8rem;
            }
            .label {
                display: none;
            }
            /* FIX: footer stacks vertically on mobile so Copy button is always visible */
            .footer {
                padding: 12px 16px;
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .stats {
                justify-content: center;
            }
            .btn-primary {
                width: 100%;
                text-align: center;
                justify-content: center;
                padding: 14px 20px;
                font-size: 1rem;
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Social Media Formatter <span>✨</span></h1>
        <p>Convert GenAI text into formatted, engaging Social Media posts.</p>
    </div>

    <div class="toolbar-group">
        <span class="label">Styles</span>
        <button onclick="applyMapping('boldSans')" title="Bold Sans"><span class="preview-bold">B</span></button>
        <button onclick="applyMapping('italicSans')" title="Italic Sans"><span class="preview-italic">I</span></button>
        <button onclick="applyMapping('boldSerif')" title="Bold Serif"><span style="font-weight: bold; font-family: serif;">B𝐬</span></button>
        <button onclick="applyMapping('boldItalicSerif')" title="Bold Italic Serif"><span style="font-weight: bold; font-style: italic; font-family: serif;">B𝐈</span></button>
        <button onclick="applyMapping('italicSerif')" title="Italic Serif"><span style="font-style: italic; font-family: serif;">I𝐬</span></button>
        <button onclick="applyMapping('sans')" title="Sans">Sans</button>
        <button onclick="applyMapping('fraktur')" title="Fraktur">𝔉𝔯𝔞𝔨</button>
        <button onclick="applyMapping('script')" title="Script">𝒮𝒸𝓇</button>
        <button onclick="applyMapping('circular')" title="Circular (Double-Struck)">𝔸𝔹ℂ</button>
        <button onclick="applyMapping('square')" title="Square (Monospace)">𝚂𝚀</button>
        <button onclick="applyUnderline()" title="Underline"><span class="preview-under">U</span></button>
        <div style="width:1px; height:20px; background:#ddd; margin:0 5px;"></div>
        <button onclick="clearFormat()" title="Clear All Styles">Clear</button>
    </div>

    <div class="toolbar-group" style="background: #fcfcfc;">
        <span class="label">Code</span>
        <button onclick="formatInlineCode()" title="Inline Code">{ } Inline</button>
        <button onclick="formatCodeBlock()" title="Code Block">{ } Block</button>
    </div>

    <div class="toolbar-group" style="background: #fcfcfc;">
        <span class="label">Magic</span>
        <button class="btn-magic" onclick="autoEmojify()" title="Add emojis to keywords">
            ✨ Auto-Emojify
        </button>
        <button onclick="showEmojiPicker()" title="Show popular emojis">➕ More Emoji</button>
        <button onclick="insertChar('• ')" title="Bullet">•</button>
        <button onclick="insertChar('✅ ')" title="Check">✅</button>
        <button onclick="insertChar('🔥 ')" title="Fire">🔥</button>
        <button onclick="insertChar('🚀 ')" title="Rocket">🚀</button>
        <button onclick="insertChar('👉 ')" title="Pointer">👉</button>
        <button onclick="convertShortcodes()" title="Convert :code: to emoji">🔄 :code:</button>
    </div>

    <div class="editor-wrapper">
        <textarea id="editor" placeholder="Paste your text here...

1. Select text and click 'B' or 'I' for styles.
2. Click 'Auto-Emojify' to instantly add relevance.
3. Use :smile: shortcodes if you prefer."></textarea>
    </div>

    <div class="footer">
        <div class="stats">
            <span id="charCount">0 chars</span>
            <span id="wordCount">0 words</span>
        </div>
        <button class="btn-primary" onclick="copyText()">Copy for Social Media</button>
    </div>
</div>

<div id="toast" class="toast">Post copied to clipboard!</div>

<!-- EMOJI PICKER MODAL -->
<div id="emojiModal" class="emoji-modal">
    <div class="emoji-modal-content">
        <!-- FIX: replaced float:right with flexbox header -->
        <div class="emoji-modal-header">
            <h2>Popular Emojis</h2>
            <button class="emoji-close-btn" onclick="closeEmojiPicker()" type="button" aria-label="Close">✕</button>
        </div>
        <div class="emoji-grid">

            <button class="emoji-btn" onclick="insertEmoji('📧')" type="button">📧</button>
        </div>
    </div>
</div>

    // Build reverse maps
    function createReverseMaps() {
        const reverse = {};
        const order = [
            'boldItalicSans', 'boldItalicSerif', 'boldSans', 'boldSerif',
            'italicSans', 'italicSerif', 'script', 'fraktur', 'circular', 'square', 'sans'
        ];
        for (const type of order) {
            if (!maps[type]) continue;
            reverse[type] = {};
            for (const char in maps[type]) {
                reverse[type][maps[type][char]] = char;
            }
        }
        return reverse;
    }
    const reverseMaps = createReverseMaps();

    // Emoji / shortcode data
    const buzzwordEmojiMap = {
        growth: '📈', sales: '💰', money: '💵', profit: '💸', team: '🤝',
        developer: '👨‍💻', engineer: '🛠️', cloud: '☁️', hiring: '📢', jobs: '💼',
        work: '🛠️', code: '💻', tech: '🤖', ai: '🧠', data: '📊', idea: '💡',
        goal: '🎯', success: '🏆', win: '🏅', learn: '📚', time: '⏳',
        deadline: '⏰', launch: '🚀', fire: '🔥', hot: '🔥', happy: '😊',
        sad: '😔', question: '❓', email: '📧', call: '📞', contact: '📬',
        link: '🔗', website: '🌐', social_media: '🌍', important: '⚠️',
        alert: '🚨', check: '✅', done: '✅'
    };
    const shortcodeMap = {
        ':rocket:': '🚀', ':fire:': '🔥', ':check:': '✅', ':smile:': '😊',
        ':chart:': '📈', ':target:': '🎯', ':brain:': '🧠', ':100:': '💯'
    };

    // --- CORE FUNCTIONS ---

    function getSelection() {
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        return { start, end, text: editor.value.substring(start, end) };
    }

    function detectFormats(char) {
        if (reverseMaps.boldItalicSans && reverseMaps.boldItalicSans[char])
            return new Set(['boldSans', 'italicSans']);
        if (reverseMaps.boldItalicSerif && reverseMaps.boldItalicSerif[char])
            return new Set(['boldItalicSerif']);
        if (reverseMaps.boldSans && reverseMaps.boldSans[char])
            return new Set(['boldSans']);
        if (reverseMaps.boldSerif && reverseMaps.boldSerif[char])
            return new Set(['boldSerif']);
        if (reverseMaps.italicSans && reverseMaps.italicSans[char])
            return new Set(['italicSans']);
        if (reverseMaps.italicSerif && reverseMaps.italicSerif[char])
            return new Set(['italicSerif']);
        if (reverseMaps.fraktur && reverseMaps.fraktur[char])
            return new Set(['fraktur']);
        if (reverseMaps.script && reverseMaps.script[char])
            return new Set(['script']);
        if (reverseMaps.circular && reverseMaps.circular[char])
            return new Set(['circular']);
        if (reverseMaps.square && reverseMaps.square[char])
            return new Set(['square']);
        return new Set();
    }

    function toPlain(char) {
        const order = [
            'boldItalicSans', 'boldItalicSerif', 'boldSans', 'boldSerif',
            'italicSans', 'italicSerif', 'script', 'fraktur', 'circular', 'square', 'sans'
        ];
        for (const type of order) {
            if (reverseMaps[type] && reverseMaps[type][char] !== undefined)
                return reverseMaps[type][char];
        }
        return char;
    }

    function formatSetToString(set) {
        return Array.from(set).sort().join(',');
    }

    // FIX: allHaveSameState now skips non-alpha chars so "𝗛𝗲𝗹𝗹𝗼 𝗪𝗼𝗿𝗹𝗱" toggles correctly
    function applyMapping(type) {
        const sel = getSelection();
        if (!sel.text) return;

        let allHaveSameState = true;
        let firstCharState = null;

        const alphaChars = Array.from(sel.text).filter(c => /[a-z]/i.test(toPlain(c)));

        if (alphaChars.length > 0) {
            firstCharState = formatSetToString(detectFormats(alphaChars[0]));
            for (let i = 1; i < alphaChars.length; i++) {
                if (formatSetToString(detectFormats(alphaChars[i])) !== firstCharState) {
                    allHaveSameState = false;
                    break;
                }
            }
        }

        let res = '';
        for (const char of sel.text) {
            const plainChar = toPlain(char);
            const currentFormats = detectFormats(char);
            let newFormats = new Set(currentFormats);

            const isAlpha = /[a-z]/i.test(plainChar);
            if (isAlpha && allHaveSameState && currentFormats.has(type)) {
                newFormats.delete(type);
            } else {
                newFormats.add(type);
            }

            let result = plainChar;
            if (newFormats.has('boldSans') && newFormats.has('italicSans')) {
                result = maps.boldItalicSans[result] || result;
            } else if (newFormats.has('boldItalicSerif')) {
                result = maps.boldItalicSerif[result] || result;
            } else if (newFormats.has('boldSans')) {
                result = maps.boldSans[result] || result;
            } else if (newFormats.has('boldSerif')) {
                result = maps.boldSerif[result] || result;
            } else if (newFormats.has('italicSans')) {
                result = maps.italicSans[result] || result;
            } else if (newFormats.has('italicSerif')) {
                result = maps.italicSerif[result] || result;
            } else if (newFormats.has('fraktur')) {
                result = maps.fraktur[result] || result;
            } else if (newFormats.has('script')) {
                result = maps.script[result] || result;
            } else if (newFormats.has('circular')) {
                result = maps.circular[result] || result;
            } else if (newFormats.has('square')) {
                result = maps.square[result] || result;
            } else if (newFormats.has('sans')) {
                result = maps.sans[result] || result;
            }
            res += result;
        }
        replaceSelection(res);
    }

    function applyUnderline() {
        const sel = getSelection();
        if (!sel.text) return;
        let res = '';
        for (const char of sel.text) res += char + '\u0332';
        replaceSelection(res);
    }

    // FIX: now calls toPlain() on every character so Unicode math styles actually clear.
    // Previously only stripped combining diacritics, leaving 𝗮 as 𝗮.
    function clearFormat() {
        const sel = getSelection();
        if (!sel.text) return;
        let clean = '';
        for (const char of sel.text) clean += toPlain(char);
        clean = clean.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        replaceSelection(clean);
    }

    // --- MAGIC EMOJI ---

    function autoEmojify() {
        const text = editor.value;
        const newText = text.replace(/\b(\w+)\b/g, (match) => {
            const lower = match.toLowerCase();
            return buzzwordEmojiMap[lower] ? `${match} ${buzzwordEmojiMap[lower]}` : match;
        });
        editor.value = newText;
        updateStats();
        showToast('Magic emojis applied! ✨');
    }

    function formatCodeBlock() {
        const sel = getSelection();
        if (!sel.text) return;
        replaceSelection('```\n' + sel.text + '\n```');
        showToast('Code block formatted! 💻');
    }

    function formatInlineCode() {
        const sel = getSelection();
        if (!sel.text) return;
        replaceSelection('`' + sel.text + '`');
        showToast('Inline code formatted! 📝');
    }

    function showEmojiPicker() {
        document.getElementById('emojiModal').classList.add('visible');
    }

    function closeEmojiPicker() {
        document.getElementById('emojiModal').classList.remove('visible');
    }

    function insertEmoji(emoji) {
        const start = editor.selectionStart;
        editor.value = editor.value.substring(0, start) + emoji + ' ' + editor.value.substring(start);
        // Use spread to count Unicode code points, not UTF-16 units
        editor.selectionStart = editor.selectionEnd = start + [...emoji].length + 1;
        editor.focus();
        closeEmojiPicker();
        updateStats();
    }

    function convertShortcodes() {
        let text = editor.value;
        for (const code in shortcodeMap) {
            text = text.split(code).join(shortcodeMap[code]);
        }
        editor.value = text;
        updateStats();
        showToast('Shortcodes converted! 🔄');
    }

    // --- UTILS ---

    function insertChar(char) {
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        editor.value = editor.value.substring(0, start) + char + editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = start + char.length;
        editor.focus();
        updateStats();
    }

    function replaceSelection(newText) {
        const start = editor.selectionStart;
        editor.value = editor.value.substring(0, start) + newText + editor.value.substring(editor.selectionEnd);
        editor.selectionStart = editor.selectionEnd = start + newText.length;
        editor.focus();
        updateStats();
    }

    function copyText() {
        if (!editor.value) return;
        navigator.clipboard.writeText(editor.value).then(() => {
            showToast('Copied to clipboard! 📋');
        }).catch(() => {
            // Fallback for older browsers
            editor.select();
            document.execCommand('copy');
            showToast('Copied! 📋');
        });
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('visible');
        setTimeout(() => toast.classList.remove('visible'), 2500);
    }

    function updateStats() {
        charCount.innerText = editor.value.length + ' chars';
        const words = editor.value.trim().split(/\s+/).filter(n => n).length;
        wordCount.innerText = words + ' words';
    }

    editor.addEventListener('input', updateStats);

    document.getElementById('emojiModal').addEventListener('click', function(e) {
        if (e.target === this) closeEmojiPicker();
    });
</script>
